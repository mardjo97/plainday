publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.20.3
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  uuid: ^4.6.0
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.1
